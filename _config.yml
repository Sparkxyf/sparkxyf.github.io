# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl:
url: https://sparkxyf.com
date_format: "ordinal"
title: spark
subtitle: "天行健，君子以自强不息"
description: "遇到喜欢的人，就像浩劫余生，漂流过沧海，终见陆地。"
keywords: spark
timezone: Asia/Shanghai
encoding: "utf-8"
# 页面左下角显示的年份
since: 2022
# 源码仓库，请替换成自己的
repository: Sparkxyf/sparkxyf.github.io
# 对 css 和 js 资源的 cdn 加速配置
cdn:
    jsdelivr:
        enabled: false
# 可选组件配置
components:
  # 分享
  # weibo,qq,wechat,douban,qzone,linkedin,facebook,twitter
  share:
    enabled: false
    hide-platforms: qq,facebook
  # 不蒜子访问统计
  busuanzi:
    enabled: false
    start_date: 2020-05-03
  # My Popular Repositories
  side_bar_repo:
    enabled: false
    limit: 5
  # 文章字数统计
  word_count:
    enabled: true
  # 页面右上角，以及「关于」页面的二维码
  # 修改图片请替换 assets/images/qrcode.jpg
  qrcode:
    enabled: false
    image_alt: spark
  # 维基索引页使用哪种视图，支持 列表（list）/分类（cate）
  wiki:
    view: cate
# 压缩页面内容
compress_html:
  clippings: all
  comments: ["<!--", "-->"]
# 代码高亮风格，支持的 theme 列表见 https://github.com/mzlogin/rouge-themes
highlight_theme: github

# ---------------- #
#      Author      #
# ---------------- #
author: Spark Xiong
organization:
organization_url:
github_username: sparkxyf
location: Shanghai, China
email: spark.xiong@icloud.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs:
  -
    href: /
    label: 首页

#  -
#    href: /categories/
#    label: 分类

#   -
#     href: /archives/
#     label: 归档

#   -
#     href: /open-source/
#     label: 开源

  -
    href: /tao/
    label: 编程之道

#  -
#    href: /links/
#    label: 链接

  -
    href: /about/
    label: 关于

# ---------------- #
#       RSS        #
# ---------------- #
subscribe_rss: /feed.xml

# ---------------- #
#      Jekyll      #
# ---------------- #
markdown: kramdown
kramdown:
    input: GFM
    syntax_highlighter: rouge
highlighter: rouge
paginate: 10
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:year/:month/:day/:title/
plugins:
    - jekyll-github-metadata
    - rouge
#     - jekyll-html-pipeline
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-feed
    - jemoji
#     - jekyll-mentions
collections:
    wiki:
        output: true
        permalink: /wiki/:path/
    tao:
        output: true
        permalink: /tao/:path/


# ---------------- #
#      Comments    #
# ---------------- #
# support provider: disqus, gitment, gitalk, utterances, beaudar
comments_provider: beaudar
beaudar:
    repo: Sparkxyf/blog-comments
# 在使用其它评论组件时可点击显示 Disqus
lazy_load_disqus : false

# ---------------- #
#      Search      #
# ---------------- #
simple_jekyll_search:
    # 是否支持全文搜索
    fulltext: true
    # 最多显示多少条搜索结果
    limit: 10

# ---------------- #
#      Google      #
# ---------------- #
google:
    analytics_id: G-0W1C4K5F21
    adsense:
        footer: false
        sidebar: true 
        sidebar-detail: true 
        content_header: false
        content_footer: false
